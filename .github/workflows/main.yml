name: CI Pipeline

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches:
      - main
    paths:
      - "**.js"
      - "package.json"
      - "package-lock.json"
      - "Dockerfile"
      - "docker-compose.yml"
      - ".github/workflows/**"
  pull_request:
    branches:
      - main
    paths:
      - "**.js"
      - "package.json"
      - "package-lock.json"
      - "Dockerfile"
      - "docker-compose.yml"
      - ".github/workflows/**"

jobs:
  # -----------------------
  # TEST (matrix)
  # -----------------------
  test:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: true
      matrix:
        node-version: [18, 20, 22]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"

      - run: npm ci
      - run: npm test

  # -----------------------
  # BUILD ARTIFACT
  # -----------------------
  build:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"

      - run: npm ci

      - name: Run build
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: dist/

  # -----------------------
  # DEPLOY (artifact simulation)
  # -----------------------
  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: build-output

      - run: ls -R
      - run: cat output.txt

  # -----------------------
  # DOCKER BUILD (no push)
  # -----------------------
  docker-build:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t ci-cd-app:${{ github.sha }} .

  # -----------------------
  # INTEGRATION TEST (real system)
  # -----------------------
  integration:
    runs-on: ubuntu-latest
    needs: docker-build

    steps:
      - name: Create network
        run: docker network create mynet

      - name: Run Mongo
        run: |
          docker run -d --name mongo \
            --network mynet \
            mongo:6

      - name: Run App
        run: |
          docker run -d --name app \
            --network mynet \
            -p 3000:3000 \
            ci-cd-app:${{ github.sha }}

      - name: Wait for app
        run: sleep 8

      - name: Test endpoint
        run: curl http://localhost:3000

  # -----------------------
  # DOCKER PUSH (protected)
  # -----------------------
  docker-push:
    runs-on: ubuntu-latest
    needs: integration
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Login to Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Tag and push image
        run: |
          docker tag ci-cd-app:${{ github.sha }} ${{ secrets.DOCKER_USERNAME }}/ci-cd-app:${{ github.sha }}
          docker tag ci-cd-app:${{ github.sha }} ${{ secrets.DOCKER_USERNAME }}/ci-cd-app:latest

          docker push ${{ secrets.DOCKER_USERNAME }}/ci-cd-app:${{ github.sha }}
          docker push ${{ secrets.DOCKER_USERNAME }}/ci-cd-app:latest
