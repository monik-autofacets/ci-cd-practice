name: CI Pipeline

on:
  push:
    branches:
      - main
    paths:
      - "**.js"
      - "package.json"
      - "package-lock.json"
  pull_request:
    branches:
      - main
    paths:
      - "**.js"
      - "package.json"
      - "package-lock.json"

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: true
      matrix:
        node-version: [18, 20, 22]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"

      - run: npm install
      - run: npm test

  build:
    runs-on: ubuntu-latest
    needs: test # ✅ ensure only valid code builds

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"

      - run: npm install

      - name: Run build
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: dist/

  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: build-output

      - run: ls -R
      - run: cat output.txt

  docker:
    runs-on: ubuntu-latest
    needs: build # ✅ builds only after successful build

    steps:
      - uses: actions/checkout@v4

      - name: Login to Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Build and tag image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/ci-cd-app:${{ github.sha }} .
          docker tag ${{ secrets.DOCKER_USERNAME }}/ci-cd-app:${{ github.sha }} ${{ secrets.DOCKER_USERNAME }}/ci-cd-app:latest

      - name: Push image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/ci-cd-app:${{ github.sha }}
          docker push ${{ secrets.DOCKER_USERNAME }}/ci-cd-app:latest

  integration:
    runs-on: ubuntu-latest
    needs: docker

    steps:
      - name: Create network
        run: docker network create mynet

      - name: Run Mongo
        run: |
          docker run -d --name mongo \
            --network mynet \
            mongo:6

      - name: Run app
        run: |
          docker run -d --name app \
            --network mynet \
            ${{ secrets.DOCKER_USERNAME }}/ci-cd-app:${{ github.sha }}

      - name: Wait for app
        run: sleep 8

      - name: Test endpoint
        run: curl http://localhost:3000
